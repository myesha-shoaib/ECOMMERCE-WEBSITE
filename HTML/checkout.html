<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Checkout</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>
    <div data-shell="header"></div>
    <main class="container section">
        <div class="section-head">
            <div><span class="eyebrow">Secure checkout</span>
                <h2>Delivery details</h2>
            </div>
            <p>Login is required before placing an order.</p>
        </div>
        <form class="card auth" style="max-width:760px" onsubmit="placeOrder(event)">
            <div class="notice">Your cart remains saved even if you need to login first.</div>
            <div class="field"><label>Phone</label><input id="phone" required></div>
            <div class="field"><label>Delivery address</label><textarea id="address" required></textarea></div>
            <div class="field"><label>Payment method</label><select>
                    <option>Cash on Delivery</option>
                    <option>Bank Transfer</option>
                    <option>Card Demo</option>
                </select></div><button class="btn full">Place order</button>
        </form>
    </main>
    <div data-shell="footer"></div>
    <script src="../JS/app.js"></script>
</body>

</html>

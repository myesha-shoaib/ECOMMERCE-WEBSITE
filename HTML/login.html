<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>
    <div data-shell="header"></div>
    <main class="container">
        <div class="card auth">
            <div class="tabs"><button class="active" onclick="showLogin()">Login</button><button
                    onclick="showRegister()">Register</button></div>
            <form id="loginForm" onsubmit="login(event)">
                <div class="field"><label>Email</label><input id="logEmail" type="email" required></div>
                <div class="field"><label>Password</label><input id="logPass" type="password" required></div><button
                    class="btn full">Login</button>
            </form>
            <form id="registerForm" hidden onsubmit="register(event)">
                <div class="field"><label>Name</label><input id="regName" required></div>
                <div class="field"><label>Email</label><input id="regEmail" type="email" required></div>
                <div class="field"><label>Password</label><input id="regPass" type="password" required></div><button
                    class="btn full">Create account</button>
            </form>
        </div>
    </main>
    <div data-shell="footer"></div>
    <script src="../JS/app.js"></script>
</body>

</html>

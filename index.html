<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Home</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>
    <div data-shell="header"></div>
    <main class="container section">
        <div class="section-head">
            <div><span class="eyebrow">Catalogue</span>
                <h2>Home products</h2>
            </div>
            <p id="results"></p>
        </div>
        <div class="toolbar"><input id="q" placeholder="Search products" oninput="renderShop()"><select id="cat"
                onchange="renderShop()">
                <option value="all">All categories</option>
                <option>Electronics</option>
                <option>Fashion</option>
                <option>Bags</option>
                <option>Beauty</option>
                <option>Home</option>
                <option>Accessories</option>
            </select><select id="sort" onchange="renderShop()">
                <option value="default">Recommended</option>
                <option value="low">Price low-high</option>
                <option value="high">Price high-low</option>
                <option value="rating">Best rated</option>
            </select><select id="max" onchange="renderShop()">
                <option value="50000">Any price</option>
                <option value="5000">Under 5,000</option>
                <option value="10000">Under 10,000</option>
                <option value="15000">Under 15,000</option>
            </select></div>
        <div id="productGrid" class="grid grid-3"></div>
    </main>
    <div data-shell="footer"></div>
    <script src="../JS/app.js"></script>
    <script>addEventListener('DOMContentLoaded', renderShop)</script>
</body>

</html>
